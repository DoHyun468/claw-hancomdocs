<h1>"곧은 따옴표"를 “둥근 따옴표”로 바꾸기</h1>
<!--<p class="ui-path">도구-빠른 교정-빠른 교정 내용</p>-->
<p class="intro">곧은 따옴표를 입력하면 둥근 따옴표로 자동 변환하여 적용합니다.</p>
<h2>자세한 정보</h2>
<h3>입력할 때 자동으로 바꾸기</h3>
<ul>
<li><strong>"곧은 따옴표"를 “둥근 따옴표”로 바꾸기</strong>
<p>곧은 따옴표의 앞에 공백이 있으면 여는 둥근 따옴표로 바꾸고 공백이 아닌 문자가 있으면(시작하는 따옴표 포함) 닫는 둥근 따옴표 모양으로 바꿉니다.</p>
</li>
<!--<li><strong>하이픈(-)을 대시(–)로 바꾸기</strong>
<p>글자 사이에 있는 단일 하이픈(-)을 짧은 대시(–)로 바꾸고 이중 하이픈(--)을 긴 대시(—)로 바꿉니다.</p>
</li>
<li><strong>서수(1st)에 위 첨자 적용</strong>
<p>숫자에 서수를 나타내는 영문자를 공백 없이 나란히 입력하면 영문자 부분을 위 첨자로 바꾸어 서수로 표현합니다.</p>
</li>
<li><strong>괄호 짝 맞추기</strong>
<p>여는 괄호와 짝이 맞지 않는 닫는 괄호를 입력했을 경우 입력된 여는 괄호와 짝이 맞도록 닫는 괄호를 자동으로 바꾸어 줍니다.</p>
</li>
<li><strong>웹 페이지와 네트워크 경로를 하이퍼링크로 연결</strong>
<p>웹 페이지, 파일 위치, 네트워크 경로, 전자 메일 주소를 하이퍼링크로 표시합니다.</p>
</li>-->
</ul>
