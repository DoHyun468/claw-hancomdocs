<h1>책갈피 이동하기</h1>
<p class="intro">현재 커서의 위치에 상관없이 책갈피를 표시해 둔 위치로 곧바로 커서를 이동시킬 수 있습니다.</p>
<h2>따라 하기</h2>
<ol>
<li>[<a href="bookmark.htm">입력-책갈피</a>]를 실행합니다.</li>
<li>[책갈피] 대화 상자의 [책갈피 목록]에서 이동하고자 하는 책갈피 이름을 선택합니다.</li>
<li>[이동] 단추를 누릅니다. [책갈피] 대화 상자가 닫히고 선택한 책갈피가 있는 위치로 커서가 이동합니다.</li>
</ol>

<h3>블록 책갈피</h3>

<h3>책갈피 정렬 기준</h3>
<p>[책갈피] 대화 상자의 [책갈피 목록]에 등록된 책갈피는 '이름'이나 '위치' 순으로 정렬할 수 있습니다. '이름' 순으로 정렬하면 이동하고자 하는 책갈피를 쉽게 찾을 수 있어 좋습니다.</p>
